```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guest List | Savad & Safreena</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #c5a059;
            --bg-soft: #fdfaf5;
        }
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-soft);
            color: #333;
        }
        .font-serif { font-family: 'Playfair Display', serif; }
        .font-cinzel { font-family: 'Cinzel', serif; }
        .card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(197, 160, 89, 0.1);
            border: 1px solid rgba(197, 160, 89, 0.2);
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-5xl mx-auto">
        <!-- Header -->
        <div class="text-center mb-10">
            <h1 class="font-cinzel text-amber-700 tracking-widest text-sm mb-2 uppercase">Wedding Dashboard</h1>
            <h2 class="font-serif text-3xl md:text-4xl text-gray-800">Savad & Safreena Guest List</h2>
            <div class="w-24 h-1 bg-amber-500/20 mx-auto mt-4"></div>
        </div>

        <!-- Stats -->
        <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="card p-6 text-center">
                <p class="text-xs uppercase tracking-widest text-gray-400 mb-1">Total RSVPs</p>
                <p id="totalRSVPs" class="text-3xl font-serif text-amber-700">0</p>
            </div>
            <div class="card p-6 text-center">
                <p class="text-xs uppercase tracking-widest text-gray-400 mb-1">Total Guests</p>
                <p id="totalGuests" class="text-3xl font-serif text-amber-700">0</p>
            </div>
        </div>

        <!-- Guest Table -->
        <div class="card overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-amber-50">
                        <tr>
                            <th class="p-4 text-xs uppercase tracking-widest text-amber-800 font-bold">Name</th>
                            <th class="p-4 text-xs uppercase tracking-widest text-amber-800 font-bold">Guests</th>
                            <th class="p-4 text-xs uppercase tracking-widest text-amber-800 font-bold">Message</th>
                            <th class="p-4 text-xs uppercase tracking-widest text-amber-800 font-bold">Time</th>
                        </tr>
                    </thead>
                    <tbody id="guestTableBody">
                        <!-- Data will appear here -->
                        <tr>
                            <td colspan="4" class="p-10 text-center text-gray-400 italic">Connecting to cloud database...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Environment Config
        const firebaseConfig = JSON.parse(__firebase_config);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'wedding-savad-safreena';
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Auth first
        signInAnonymously(auth).catch(err => console.error("Auth failed", err));

        onAuthStateChanged(auth, (user) => {
            if (user) {
                loadGuests();
            }
        });

        function loadGuests() {
            const rsvpRef = collection(db, 'artifacts', appId, 'public', 'data', 'rsvps');
            
            // Listen for real-time updates
            onSnapshot(rsvpRef, (snapshot) => {
                const tableBody = document.getElementById('guestTableBody');
                let totalRSVPs = 0;
                let totalGuestsCount = 0;
                let rows = '';

                // Get all docs and sort by timestamp in memory (Rule 2)
                const guestData = [];
                snapshot.forEach(doc => {
                    guestData.push({ id: doc.id, ...doc.data() });
                });

                // Sort: Newest first
                guestData.sort((a, b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));

                if (guestData.length === 0) {
                    tableBody.innerHTML = '<tr><td colspan="4" class="p-10 text-center text-gray-400 italic">No RSVPs received yet.</td></tr>';
                    return;
                }

                guestData.forEach(guest => {
                    totalRSVPs++;
                    
                    // Parse guest count (handles "4+" case)
                    let count = parseInt(guest.guests) || 1;
                    if (guest.guests === '4+') count = 4; // Minimal estimate
                    totalGuestsCount += count;

                    const date = guest.timestamp ? new Date(guest.timestamp.seconds * 1000).toLocaleDateString() : 'Just now';

                    rows += `
                        <tr class="border-t border-gray-100 hover:bg-gray-50 transition-colors">
                            <td class="p-4 font-semibold text-gray-800">${guest.name}</td>
                            <td class="p-4 text-amber-700 font-bold">${guest.guests}</td>
                            <td class="p-4 text-sm text-gray-600 italic max-w-xs truncate md:whitespace-normal">${guest.message || '-'}</td>
                            <td class="p-4 text-xs text-gray-400">${date}</td>
                        </tr>
                    `;
                });

                tableBody.innerHTML = rows;
                document.getElementById('totalRSVPs').innerText = totalRSVPs;
                document.getElementById('totalGuests').innerText = totalGuestsCount + "+";
            }, (error) => {
                console.error("Fetch error:", error);
                document.getElementById('guestTableBody').innerHTML = '<tr><td colspan="4" class="p-10 text-center text-red-400">Failed to load data. Ensure permissions are correct.</td></tr>';
            });
        }
    </script>
</body>
</html>
